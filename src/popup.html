<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormTime Machine</title>
    <link rel="stylesheet" href="../styles/popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="card headerCard">
        <h1>FormTime Machine</h1>
        <p class="subtitle">Save and restore page versions</p>
      </section>

      <section class="card" id="currentPageCard">
        <h2>Current page</h2>
        <p id="currentPageTitle" class="pageTitle">Loading tab…</p>
        <p id="currentPageDomain" class="muted">-</p>
        <p id="currentPageUrl" class="muted mono">-</p>
      </section>

      <section class="card">
        <h2>Save snapshot</h2>
        <label for="titleInput">Title</label>
        <input id="titleInput" type="text" maxlength="120" placeholder="e.g. Profile summary draft" />

        <label for="tagsInput">Tags</label>
        <input id="tagsInput" type="text" maxlength="200" placeholder="linkedin, profile, draft-2" />

        <div class="row">
          <button id="saveBtn" class="primary">Save Version</button>
          <button id="restoreLatestBtn" class="ghost">Restore Latest</button>
        </div>
        <p id="saveStatus" class="inlineStatus" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Filter</h2>
        <label for="searchInput">Search by title, domain, page title, or tag</label>
        <input id="searchInput" type="search" placeholder="Search snapshots" />
        <label for="tagFilterInput">Tag filter (optional)</label>
        <input id="tagFilterInput" type="search" placeholder="Type a tag, e.g. linkedin" />
        <div id="availableTags" class="tagRow"></div>
      </section>

      <section class="card">
        <div class="sectionHeader">
          <h2>Saved versions</h2>
          <div class="row compact">
            <button id="exportBtn" class="ghost">Export JSON</button>
            <label class="ghost importLabel" for="importInput">Import JSON</label>
            <input id="importInput" type="file" accept="application/json" hidden />
          </div>
        </div>

        <div id="versionsList" class="versionsList"></div>
        <div id="emptyState" class="emptyState" hidden>
          <p>No saved versions for this page yet.</p>
          <p class="muted">Save Version captures form fields and editable text so you can restore them later.</p>
        </div>
      </section>

      <p id="status" class="status info" aria-live="polite"></p>
    </main>

    <script type="module" src="../dist/popup.js"></script>
  </body>
</html>
